name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: aurimasniekis/ios-media-downloader-gateway
  GHCR_IMAGE: ghcr.io/aurimasniekis/ios-media-downloader-gateway
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  docker:
    name: Build & publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Secrets are unavailable on PRs from forks, so only log in / push for
      # pushes to main, tags, and manual runs.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          # `latest` is set automatically for the newest semver tag (flavor
          # latest=auto). main pushes get a rolling `edge` tag instead.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=ios-media-downloader-gateway
            org.opencontainers.image.description=HTTP/JSON gateway wrapping yt-dlp + gallery-dl for iOS Shortcuts
            org.opencontainers.image.source=https://github.com/aurimasniekis/ios-media-downloader-gateway
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect published manifest (architectures)
        if: github.event_name != 'pull_request'
        run: docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}

  github-release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Download.shortcut
            DownloadQuick.shortcut
